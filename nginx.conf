# HTTP — редирект на HTTPS + ACME-challenge для certbot
server {
    listen 80;
    listen [::]:80;
    server_name albert-abrarov.ru www.albert-abrarov.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://albert-abrarov.ru$request_uri;
    }
}

# www → non-www
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.albert-abrarov.ru;

    ssl_certificate     /etc/letsencrypt/live/albert-abrarov.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/albert-abrarov.ru/privkey.pem;

    return 301 https://albert-abrarov.ru$request_uri;
}

# Основной HTTPS-сервер
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name albert-abrarov.ru;

    # SSL-сертификат (выдаётся certbot-ом)
    ssl_certificate     /etc/letsencrypt/live/albert-abrarov.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/albert-abrarov.ru/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/albert-abrarov.ru/chain.pem;

    # Протоколы и шифры
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=60s;

    # Путь к файлам сайта — измени на актуальный путь на сервере
    root /home/albert/resume/site;
    index index.html;

    server_tokens off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэширование статики на год
    location ~* \.(css|js|ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Запрет доступа к .git и скрытым файлам
    location ~ /\. {
        deny all;
    }
}
